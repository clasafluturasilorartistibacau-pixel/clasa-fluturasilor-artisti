<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Clasa Fluturașilor Artiști</title>
    <style>
        body {
            margin: 0;
            font-family: "Trebuchet MS", sans-serif;
            background: linear-gradient(135deg, #cce7ff, #f7d6ff);
            color: #333;
            text-align: center;
            padding: 40px;
        }

        h1 {
            font-size: 3rem;
            color: #5a2ea6;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 10px;
        }

        p {
            font-size: 1.3rem;
            color: #4a3b5f;
        }

        /* Fluturi animați */
        .butterfly {
            position: absolute;
            width: 90px;
            animation: fly 12s infinite ease-in-out;
            opacity: 0.95;
        }

        @keyframes fly {
            0% { transform: translate(0,0) rotate(0deg); }
            25% { transform: translate(150px,-120px) rotate(20deg); }
            50% { transform: translate(300px,0) rotate(-10deg); }
            75% { transform: translate(150px,120px) rotate(15deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }

        .b1 { top: 20%; left: 10%; animation-delay: 0s; }
        .b2 { top: 60%; left: 70%; animation-delay: 2s; }
        .b3 { top: 40%; left: 30%; animation-delay: 4s; }
    </style>
</head>
<body>

    <h1>Bine ați venit la Clasa Fluturașilor Artiști</h1>
    <p>Acesta este site-ul oficial al clasei, creat de Prof. Loredana Chenciu.</p>

    <!-- Fluture mov -->
    <img src="https://i.imgur.com/1XQeQ0P.png" class="butterfly b1">

    <!-- Fluture roz -->
    <img src="https://i.imgur.com/9tQeQ0P.png" class="butterfly b2">

    <!-- Fluture albastru -->
    <img src="https://i.imgur.com/3YfQe7F.png" class="butterfly b3">

</body>
</html>
